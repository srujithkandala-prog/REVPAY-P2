<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Business Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            color: #334155;
        }
        .container {
            display: flex;
            min-height: 100vh;
        }
        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #0f172a, #020617);
            color: white;
            flex-shrink: 0;
        }
        .sidebar h2 {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #1e293b;
            font-size: 1.2rem;
        }
        .sidebar a {
            display: block;
            color: #cbd5f5;
            padding: 12px 20px;
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: 0.3s;
        }
        .sidebar a:hover {
            background: #1e293b;
            border-left: 3px solid #38bdf8;
        }
   
        .main {
            flex: 1;
            padding: 40px;
        }
 
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .dashboard-btn {
            background: #2563eb;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
  
        .upload-form {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .upload-form input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            min-width: 200px;
        }
        .upload-form input[type="file"] {
            padding: 7px;
        }
        .submit-btn {
            background: #16a34a;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .submit-btn:hover {
            background: #15803d;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th {
            background: #0f172a;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        tr:hover {
            background: #f8fafc;
        }
   
        .badge {
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }
        .pending { background: #fef3c7; color: #92400e; }
        .approved { background: #dcfce7; color: #166534; }
        .rejected { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h2>RevPay Business</h2>
        <a href="/business-dashboard">
            <i class="fa-solid fa-chart-line"></i> Dashboard
        </a>
        <a href="/profile"><i class="fa-solid fa-user"></i> Profile</a>
        <a href="/send-money"><i class="fa-solid fa-paper-plane"></i> Send Money</a>
        <a href="/request-money"><i class="fa-solid fa-hand-holding-dollar"></i> Request Money</a>
        <a href="/incoming-requests"><i class="fa-solid fa-arrow-down"></i> Incoming Requests</a>
        <a href="/outgoing-requests"><i class="fa-solid fa-arrow-up"></i> Outgoing Requests</a>
        <a href="/transactions"><i class="fa-solid fa-money-bill-transfer"></i> Transactions</a>
        <a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </div>

    <div class="main">
        <div class="header">
            <h2>Business Verification 📄</h2>
            <a href="/business-dashboard" class="dashboard-btn">
                <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <div class="card">
            <h3 style="margin-top:0">Upload New Document</h3>
            <form th:action="@{/submit-verification}" method="post" enctype="multipart/form-data" class="upload-form">
                <input type="text" name="documentName" placeholder="Document Name (GST, PAN, License)" required>
                <input type="file" name="file" required>
                <button type="submit" class="submit-btn">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Submit Verification
                </button>
            </form>
        </div>

        <div class="card">
            <h3 style="margin-top:0">Your Verification Requests</h3>
            <table>
                <thead>
                    <tr>
                        <th>Document</th>
                        <th>Status</th>
                        <th>Submitted Date</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="v : ${verifications}">
                        <td th:text="${v.documentName}"></td>
                        <td>
                            <span th:if="${v.status=='PENDING'}" class="badge pending">Pending</span>
                            <span th:if="${v.status=='APPROVED'}" class="badge approved">Approved</span>
                            <span th:if="${v.status=='REJECTED'}" class="badge rejected">Rejected</span>
                        </td>
                        <td th:text="${#temporals.format(v.createdDate,'dd-MM-yyyy HH:mm')}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
