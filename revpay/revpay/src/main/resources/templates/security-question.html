<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Security Question</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#28a745;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.error{
color:red;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>Security Verification</h2>

<p><b th:text="${question}"></b></p>

<p class="error" th:text="${error}"></p>

<form action="/verify-answer" method="post">

<input type="hidden" name="email" th:value="${email}">

<input type="text" name="answer" placeholder="Enter your answer" required>

<button type="submit">Verify</button>

</form>

</div>

</body>
</html>
