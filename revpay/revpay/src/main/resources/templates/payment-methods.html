<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Payment Methods</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f1f5f9;
color:#334155;
}

.wrapper{
display:flex;
height:100vh;
}

.sidebar{
width:240px;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
display:flex;
flex-direction:column;
}

.sidebar h2{
text-align:center;
padding:20px;
margin:0;
border-bottom:1px solid #1e293b;
}

.sidebar a{
display:block;
padding:12px 20px;
color:#cbd5f5;
text-decoration:none;
border-left:3px solid transparent;
transition:0.2s;
}

.sidebar a:hover{
background:#1e293b;
border-left:3px solid #38bdf8;
color:white;
}

.main{
flex:1;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.dashboard-btn{
background:#16a34a;
color:white;
padding:8px 15px;
border-radius:6px;
text-decoration:none;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}

input{
padding:10px;
border:1px solid #ddd;
border-radius:6px;
margin:5px;
}

button{
padding:10px 15px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#0f172a;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #e2e8f0;
}

.default{
background:#dcfce7;
color:#166534;
padding:4px 10px;
border-radius:12px;
font-size:12px;
font-weight:bold;
}

.action a{
text-decoration:none;
margin-right:10px;
color:#2563eb;
font-weight:500;
}

.error{
color:red;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<h2 th:if="${user.role.name() == 'BUSINESS'}">RevPay Business</h2>
<h2 th:if="${user.role.name() != 'BUSINESS'}">RevPay</h2>

<a th:if="${user.role.name() == 'BUSINESS'}"
   href="/business-dashboard">
<i class="fa-solid fa-chart-line"></i> Dashboard
</a>

<a th:if="${user.role.name() != 'BUSINESS'}"
   href="/dashboard">
<i class="fa-solid fa-chart-line"></i> Dashboard
</a>

<a href="/send-money"><i class="fa-solid fa-paper-plane"></i> Send Money</a>
<a href="/transactions-history"><i class="fa-solid fa-clock"></i> Transactions</a>
<a href="/payment-methods"><i class="fa-solid fa-credit-card"></i> Payment Methods</a>
<a href="/create-invoice"><i class="fa-solid fa-file-invoice"></i> Create Invoice</a>
<a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>

</div>

<div class="main">

<div class="header">

<h2>Payment Methods 💳</h2>

<a th:if="${user.role.name() == 'BUSINESS'}"
   href="/business-dashboard"
   class="dashboard-btn">← Dashboard</a>

<a th:if="${user.role.name() != 'BUSINESS'}"
   href="/dashboard"
   class="dashboard-btn">← Dashboard</a>

</div>

<div class="card">

<h3>Add New Card</h3>

<div class="error" th:if="${error}" th:text="${error}"></div>

<form th:action="@{/add-card}" method="post" th:object="${card}">

<input type="text"
th:field="*{cardNumber}"
placeholder="Card Number"
pattern="[0-9]{16}"
maxlength="16"
title="Card number must be 16 digits"
required>

<input type="text"
th:field="*{expiry}"
placeholder="MM/YY"
pattern="(0[1-9]|1[0-2])\/[0-9]{2}"
title="Expiry must be in MM/YY format"
required>

<input type="text"
th:field="*{cvv}"
placeholder="CVV"
pattern="[0-9]{3}"
maxlength="3"
title="CVV must be 3 digits"
required>

<input type="text"
th:field="*{billingAddress}"
placeholder="Billing Address"
required>

<button type="submit">
<i class="fa-solid fa-plus"></i> Add Card
</button>

</form>

</div>

<div class="card">

<h3>Saved Cards</h3>

<table>

<tr>
<th>Card</th>
<th>Expiry</th>
<th>Default</th>
<th>Action</th>
</tr>

<tr th:each="m : ${methods}">

<td th:text="${'**** **** **** ' + #strings.substring(m.cardNumber,12,16)}"></td>

<td th:text="${m.expiry}"></td>

<td>
<span th:if="${m.default}" class="default">Default</span>
</td>

<td class="action">

<a th:href="@{/set-default/{id}(id=${m.id})}">
Set Default
</a>

<a th:href="@{/delete-card/{id}(id=${m.id})}">
Delete
</a>

</td>

</tr>

</table>

</div>

</div>

</div>

</body>
</html>
