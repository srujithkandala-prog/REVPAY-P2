<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Apply Loan</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f1f5f9;
color:#334155;
}

.wrapper{
display:flex;
height:100vh;
}


.sidebar{
width:240px;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
display:flex;
flex-direction:column;
}

.sidebar h2{
text-align:center;
padding:20px;
margin:0;
border-bottom:1px solid #1e293b;
}

.sidebar a{
display:block;
padding:12px 20px;
color:#cbd5f5;
text-decoration:none;
border-left:3px solid transparent;
transition:0.2s;
}

.sidebar a:hover{
background:#1e293b;
border-left:3px solid #38bdf8;
color:white;
}

.main{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
}

.header{
width:450px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.dashboard-btn{
background:#16a34a;
color:white;
padding:8px 15px;
border-radius:6px;
text-decoration:none;
}

.dashboard-btn:hover{
background:#15803d;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
width:450px;
}

input{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
margin-top:5px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

.emi-box{
background:#f8fafc;
padding:10px;
border-radius:6px;
margin-bottom:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="wrapper">


<div class="sidebar">

<h2>RevPay Business</h2>

<a href="/business-dashboard"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
<a href="/send-money"><i class="fa-solid fa-paper-plane"></i> Send Money</a>
<a href="/transactions-history"><i class="fa-solid fa-clock"></i> Transactions</a>
<a href="/create-invoice"><i class="fa-solid fa-file-invoice"></i> Create Invoice</a>
<a href="/apply-loan"><i class="fa-solid fa-landmark"></i> Apply Loan</a>
<a href="/my-loans"><i class="fa-solid fa-coins"></i> My Loans</a>
<a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>

</div>


<div class="main">

<div class="header">

<h2>Apply Loan</h2>

<a href="/business-dashboard" class="dashboard-btn">
← Dashboard
</a>

</div>

<div class="card">

<form th:action="@{/apply-loan}" th:object="${loan}" method="post">

<label>Loan Amount</label>
<input type="number"
th:field="*{amount}"
id="amount"
required>

<label>Purpose</label>
<input type="text"
th:field="*{purpose}"
required>

<label>Interest Rate (%)</label>
<input type="number"
step="0.1"
th:field="*{interestRate}"
id="rate">

<label>Tenure (Months)</label>
<input type="number"
th:field="*{tenureMonths}"
id="months"
required>

<div class="emi-box">
Estimated EMI: ₹ <span id="emi">0</span>
</div>

<button type="submit">
<i class="fa-solid fa-landmark"></i> Apply Loan
</button>

</form>

</div>

</div>

</div>

<script>



function calculateEMI(){

let P=document.getElementById("amount").value || 0;
let r=document.getElementById("rate").value/1200 || 0;
let n=document.getElementById("months").value || 0;

let emi=0;

if(P>0 && r>0 && n>0){
emi=(P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
}

document.getElementById("emi").innerText=emi.toFixed(2);

}

document.getElementById("amount").oninput=calculateEMI;
document.getElementById("rate").oninput=calculateEMI;
document.getElementById("months").oninput=calculateEMI;

</script>

</body>
</html>
