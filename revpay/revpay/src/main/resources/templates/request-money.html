<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Request Money</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f1f5f9;
color:#334155;
}

.container{
display:flex;
height:100vh;
}


.sidebar{
width:240px;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
display:flex;
flex-direction:column;
}

.sidebar h2{
text-align:center;
padding:20px;
border-bottom:1px solid #1e293b;
}

.sidebar a{
display:block;
color:#cbd5f5;
padding:12px 20px;
text-decoration:none;
border-left:3px solid transparent;
}

.sidebar a:hover{
background:#1e293b;
border-left:3px solid #38bdf8;
}

.main{
flex:1;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}


.btn{
padding:10px 18px;
border-radius:6px;
text-decoration:none;
font-size:14px;
}

.btn-dashboard{
background:#16a34a;
color:white;
}

.btn-logout{
background:#ef4444;
color:white;
}



.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
max-width:500px;
}

.wallet{
background:#2563eb;
color:white;
padding:15px;
border-radius:8px;
margin-bottom:20px;
font-weight:bold;
}



input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #cbd5e1;
border-radius:6px;
}


button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

.quick-actions{
margin-top:20px;
display:flex;
gap:10px;
}

.quick-actions a{
flex:1;
text-align:center;
padding:10px;
background:#0f172a;
color:white;
border-radius:6px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">



<div class="sidebar">



<h2 th:text="${user.role.name() == 'BUSINESS'} ? 'RevPay Business' : 'RevPay'"></h2>


<a th:href="${user.role.name() == 'BUSINESS'} ? '/business-dashboard' : '/dashboard'">
<i class="fa-solid fa-chart-line"></i> Dashboard
</a>

<a href="/profile"><i class="fa-solid fa-user"></i> Profile</a>
<a href="/send-money"><i class="fa-solid fa-paper-plane"></i> Send Money</a>
<a href="/request-money"><i class="fa-solid fa-hand-holding-dollar"></i> Request Money</a>
<a href="/transactions"><i class="fa-solid fa-money-bill-transfer"></i> Transactions</a>
<a href="/notifications"><i class="fa-solid fa-bell"></i> Notifications</a>
<a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>

</div>



<div class="main">

<div class="header">

<h2>Request Money 💰</h2>

<div>

<a th:href="${user.role.name() == 'BUSINESS'} ? '/business-dashboard' : '/dashboard'"
class="btn btn-dashboard">

<i class="fa-solid fa-arrow-left"></i> Dashboard

</a>

<a href="/logout" class="btn btn-logout">
Logout
</a>

</div>

</div>

<div class="card">

<div class="wallet">
Wallet Balance: ₹ <span th:text="${wallet}"></span>
</div>

<form th:action="@{/request-money}" method="post"
th:object="${request}">

<label>Receiver Email</label>

<input type="email"
th:field="*{receiverEmail}"
placeholder="Enter receiver email"
required>

<label>Amount</label>

<input type="number"
step="0.01"
th:field="*{amount}"
placeholder="Enter amount"
required>

<label>Purpose</label>

<input type="text"
th:field="*{purpose}"
placeholder="Purpose of request"
required>

<button type="submit">

<i class="fa-solid fa-hand-holding-dollar"></i>
Send Request

</button>

</form>

<div class="quick-actions">

<a href="/send-money">
<i class="fa-solid fa-paper-plane"></i>
Send Money
</a>

<a href="/transactions">
<i class="fa-solid fa-clock-rotate-left"></i>
Transactions
</a>

</div>

</div>

</div>

</div>

</body>
</html>
