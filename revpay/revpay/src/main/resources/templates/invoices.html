<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Invoices</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f1f5f9;
color:#334155;
}



.wrapper{
display:flex;
height:100vh;
}


.sidebar{
width:240px;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
display:flex;
flex-direction:column;
}

.sidebar h2{
text-align:center;
padding:20px;
margin:0;
border-bottom:1px solid #1e293b;
}

.sidebar a{
display:block;
padding:12px 20px;
color:#cbd5f5;
text-decoration:none;
border-left:3px solid transparent;
transition:0.2s;
}

.sidebar a:hover{
background:#1e293b;
border-left:3px solid #38bdf8;
color:white;
}


.main{
flex:1;
padding:40px;
}


.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}


.dashboard-btn{
background:#16a34a;
color:white;
padding:8px 15px;
border-radius:6px;
text-decoration:none;
}

.dashboard-btn:hover{
background:#15803d;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}


table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#0f172a;
color:white;
padding:12px;
font-size:14px;
}

td{
padding:12px;
border-bottom:1px solid #e2e8f0;
font-size:14px;
}

tr:hover{
background:#f8fafc;
}


.badge{
padding:4px 10px;
border-radius:12px;
font-size:12px;
font-weight:bold;
}

.paid{
background:#dcfce7;
color:#166534;
}

.pending{
background:#fef3c7;
color:#92400e;
}

.overdue{
background:#fee2e2;
color:#991b1b;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<h2>RevPay Business</h2>

<a href="/business-dashboard"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
<a href="/send-money"><i class="fa-solid fa-paper-plane"></i> Send Money</a>
<a href="/request-money"><i class="fa-solid fa-hand-holding-dollar"></i> Request Money</a>
<a href="/transactions-history"><i class="fa-solid fa-clock"></i> Transactions</a>
<a href="/create-invoice"><i class="fa-solid fa-file-invoice"></i> Create Invoice</a>
<a href="/invoices"><i class="fa-solid fa-receipt"></i> Invoices</a>
<a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>

</div>


<div class="main">

<div class="header">

<h2>Invoice History 🧾</h2>

<a href="/business-dashboard" class="dashboard-btn">
← Dashboard
</a>

</div>

<div class="card">

<table>

<tr>
<th>Customer</th>
<th>Email</th>
<th>Description</th>
<th>Item</th>
<th>Qty</th>
<th>Unit Price</th>
<th>Tax</th>
<th>Amount</th>
<th>Status</th>
<th>Due Date</th>
<th>Created</th>
</tr>

<tr th:each="i : ${invoices}">

<td th:text="${i.customerName}"></td>

<td th:text="${i.customerEmail}"></td>

<td th:text="${i.description}"></td>

<td th:text="${i.itemDescription}"></td>

<td th:text="${i.quantity}"></td>

<td>₹ <span th:text="${i.unitPrice}"></span></td>

<td th:text="${i.tax} + '%'"></td>

<td>₹ <span th:text="${i.amount}"></span></td>

<td>

<span th:if="${i.status=='PAID'}"
class="badge paid">Paid</span>

<span th:if="${i.status=='PENDING'}"
class="badge pending">Pending</span>

<span th:if="${i.status=='OVERDUE'}"
class="badge overdue">Overdue</span>

</td>

<td th:text="${i.dueDate}"></td>

<td th:text="${#temporals.format(i.createdDate,'dd-MM-yyyy HH:mm')}"></td>

</tr>

</table>

</div>

</div>

</div>

</body>
</html>
