<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Loan Report</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

th{
background:#0f172a;
color:white;
}

</style>

</head>

<body>

<div class="header">

<h2>Loan Report</h2>

<a href="/admin/reports">
<button>← Back</button>
</a>

</div>

<table>

<tr>
<th>Business Email</th>
<th>Amount</th>
<th>Status</th>
<th>Tenure</th>
</tr>

<tr th:each="l : ${loans}">
<td th:text="${l.businessEmail}"></td>
<td th:text="${l.amount}"></td>
<td th:text="${l.status}"></td>
<td th:text="${l.tenureMonths}"></td>
</tr>

</table>

</body>

</html>
